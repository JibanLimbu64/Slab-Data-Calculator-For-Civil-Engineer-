<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>एथर प्रमाणीकरण सत्र</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --accent: #06b6d4;
            --dark: #030712;
            --dark-card: rgba(17, 24, 39, 0.6);
            --gray: #9ca3af;
            --text-light: #f3f4f6;
            --success: #10b981;
            --error: #ef4444;
            --mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.08), transparent 50%);
            pointer-events: none;
            z-index: -2;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            background: var(--dark-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(24px);
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .auth-logo span {
            font-family: var(--mono);
            font-size: 0.75rem;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-light);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.5rem;
        }

        .auth-subtitle {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
        }

        .auth-input {
            width: 100%;
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 0.85rem 1rem 0.85rem 3rem;
            color: #fff;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary-light);
            background: rgba(3, 7, 18, 0.8);
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.15);
        }

        .network-badge {
            font-family: var(--mono);
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-auth-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #0891b2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.9rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .auth-switch a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div id="navbar-container"></div>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                लग इन गर्नुहोस्
            </div>
            <!-- <p class="auth-subtitle">संरचनात्मक प्रशासन सत्र कुञ्जी स्थापना गर्नुहोस्</p> -->
        </div>

        <div class="network-badge" id="netStatus">
            <span
                style="width: 6px; height: 6px; background: var(--success); border-radius: 50%; display: inline-block;"></span>
            नेटवर्क पाइपलाइन जडित छ|
        </div>

        <form id="loginForm" onsubmit="handleValidation(event)">
            <div class="input-group">
                <input type="text" class="auth-input" id="loginUsername"
                    placeholder="तपाईंको प्रयोगकर्ता नाम (Username)" required>
                <i class="fas fa-user-shield"></i>
            </div>
            <div class="input-group">
                <input type="password" class="auth-input" id="loginPassword" placeholder="पहुँच प्रमाणीकरण पासकी"
                    required>
                <i class="fas fa-key"></i>
            </div>

            <button type="submit" class="btn-auth-submit">
                सेसन लिंक बनाऊ<i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div class="auth-switch">
            कुनै सक्रिय प्रमाणीकरण प्रोफाइल छैन?<a href="signup.html">दर्ता गर्नुहोस्</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        function handleValidation(e) {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);

            Toastify({ text: "🔑 पासकी मान्यीकरण गर्दै...", duration: 1000, style: { background: "var(--primary)" } }).showToast();

            fetch('login.php', {
                method: 'POST',
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        Toastify({
                            text: "🎉 " + data.message + " नियन्त्रण डेक जोड्दै...",
                            duration: 2000, style: { background: "var(--success)" }
                        }).showToast();
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    } else {
                        // Triggers dynamically if password fails or user is missing
                        Toastify({
                            text: "✕ " + data.message,
                            duration: 5000, style: { background: "linear-gradient(135deg, #7f1d1d, #ef4444)" }
                        }).showToast();
                    }
                })
                .catch(error => {
                    Toastify({ text: "✕ सर्भर जडान त्रुटि।", duration: 4000, style: { background: "var(--error)" } }).showToast();
                });
        }
    </script>
    <script src="navbar.js">
        renderNavbar('navbar-container');
    </script>
</body>

</html>
